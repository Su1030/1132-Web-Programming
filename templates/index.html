{% extends "base.html" %}
{% block content %}
<article class="content-card">
    <h2>會員系統首頁</h2>
    <p>歡迎使用本會員管理系統，請選擇您的操作：</p>
    <div class="grid">
        <form action="{{ url_for('login_route') }}" method="GET" style="display: inline;">
            <button type="submit" class="primary">登入</button>
        </form>

        <form action="{{ url_for('register_route') }}" method="GET" style="display: inline;">
            <button type="submit" class="secondary">註冊</button>
        </form>
    </div>
</article>
{% endblock %}
