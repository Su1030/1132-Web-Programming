{% extends "base.html" %}
{% block content %}
<article class="content-card">
    <h2>會員管理控制台</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>帳號</th>
                    <th>Email</th>
                    <th>電話</th>
                    <th>出生日期</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td>{{ u.username }}</td>
                    <td>{{ u.email }}</td>
                    <td>{{ u.phone | mask_phone }}</td>
                    <td>{{ u.birthdate | format_tw_date }}</td>
                    <td>
                        <div style="display: flex; gap: 5px;">
                            <form action="{{ url_for('edit_user_route', username=u.username) }}" method="GET">
                                <button type="submit" class="button">編輯</button>
                            </form>
                            {% if u.username != 'admin' and u.username != session.username %}
                            <form action="{{ url_for('delete_user_route', username=u.username) }}" method="POST" onsubmit="return confirm('確定刪除？')">
                                <button type="submit" class="error">刪除</button>
                            </form>
                            {% endif %}
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <footer class="footer">
        <form action="javascript:history.back()">
            <button type="submit" class="secondary">回前頁</button>
        </form>
    </footer>
</article>
{% endblock %}
