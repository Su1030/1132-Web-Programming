{% extends "base.html" %}
{% block content %}
<h2>會員清單</h2>
<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>帳號</th>
                <th>Email</th>
                <th>電話</th>
                <th>出生日期</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.username }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.phone | mask_phone }}</td>
                <td>{{ user.birthdate | format_tw_date }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<br>
<a href="{{ url_for('index') }}" class="secondary">返回首頁</a>
{% endblock %}
