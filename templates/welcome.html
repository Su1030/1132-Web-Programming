{% extends "base.html" %}

{% block title %}歡迎 - 會員系統{% endblock %}

{% block content %}
<article class="content-card">
    <header style="text-align: center;">
        <h2 style="margin-bottom: 0.5rem; color: var(--error-color) !important;">🎉 歡迎回來，{{ user.username }}！</h2>
        <p style="color: var(--secondary-color) !important;">以下是您的個人註冊資訊：</p>
    </header>

    <div class="info-list">
        <div class="info-item">
            <span class="info-label">使用者名稱</span>
            <span>{{ user.username }}</span>
        </div>
        <div class="info-item">
            <span class="info-label">電子郵件</span>
            <span>{{ user.email }}</span>
        </div>
        <div class="info-item">
            <span class="info-label">聯絡電話</span>
            <span>{{ user.phone }}</span>
        </div>
        <div class="info-item">
            <span class="info-label">出生日期</span>
            <span>{{ user.birthdate }}</span>
        </div>
    </div>

    <footer style="margin-top: 2rem;">
        <div class="grid">
            <a href="{{ url_for('users_list_route') }}" class="contrast">查看會員清單</a>
            <a href="{{ url_for('index') }}" class="outline">返回首頁</a>
        </div>
    </footer>
</article>
{% endblock %}
